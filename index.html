<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Aljabar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Latihan Aljabar Matematika</h1>
        <p>Coba kerjakan soal di bawah ini, lalu lihat jawabannya!</p>
    </header>

    <main>
        <div class="soal">
            <h2>Soal 1</h2>
            <p>2x + 5 = 15</p>
            <button onclick="toggleJawaban('j1')">Lihat Jawaban</button>
            <p id="j1" class="jawaban">x = 5</p>
        </div>

        <div class="soal">
            <h2>Soal 2</h2>
            <p>3x - 4 = 11</p>
            <button onclick="toggleJawaban('j2')">Lihat Jawaban</button>
            <p id="j2" class="jawaban">x = 5</p>
        </div>

        <div class="soal">
            <h2>Soal 3</h2>
            <p>5x + 2 = 2x + 14</p>
            <button onclick="toggleJawaban('j3')">Lihat Jawaban</button>
            <p id="j3" class="jawaban">x = 4</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
